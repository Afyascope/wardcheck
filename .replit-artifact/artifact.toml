kind = "web"
previewPath = "/"
title = "WardCheck"
version = "1.0.0"
id = "artifacts/wardcheck"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23121

[services.development]
run = "pnpm --filter @workspace/wardcheck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wardcheck", "run", "build" ]
serve = "static"
publicDir = "artifacts/wardcheck/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23121"
BASE_PATH = "/"
