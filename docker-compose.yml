# WardCheck Docker Compose
# Usage:
#   cp backend/.env.example backend/.env   # edit with real values
#   docker compose up --build -d
#   docker compose exec backend node scripts/seed-admin.mjs

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: wardcheck
      POSTGRES_USER: wardcheck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wardcheck_dev}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wardcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://wardcheck:${POSTGRES_PASSWORD:-wardcheck_dev}@db:5432/wardcheck?schema=public

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
